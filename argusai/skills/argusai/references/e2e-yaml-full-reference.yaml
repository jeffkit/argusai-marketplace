# ============================================================
# ArgusAI e2e.yaml — 完整配置参考
# 所有字段均带注释说明，可作为模板裁剪使用
# ============================================================

version: "1"

# -------------------- 项目基本信息 --------------------
project:
  name: my-service           # 项目名（用于 Docker 资源命名空间）
  description: "示例项目"
  version: "1.0.0"

# -------------------- 单服务模式 --------------------
# 与 services[] 互斥，单容器场景使用
service:
  build:
    image: my-service:latest        # 镜像名（支持变量）
    dockerfile: ./Dockerfile        # Dockerfile 路径
    context: .                      # 构建上下文
    args:                           # 构建参数（可选）
      NODE_ENV: production
  container:
    name: my-service-e2e            # 容器名
    ports:
      - "8080:8080"                 # 端口映射 host:container
    environment:                    # 环境变量（可选）
      NODE_ENV: test
      DATABASE_URL: "sqlite::memory:"
    volumes:                        # Volume 挂载（可选）
      - "./data:/app/data"
    healthcheck:                    # 健康检查（可选）
      path: /health                 # HTTP 健康检查路径
      port: 8080                    # 容器内端口（未指定时自动推断）
      interval: "5s"
      timeout: "3s"
      retries: 5
      startPeriod: "10s"
  vars:                             # 自定义变量（可选）
    API_PREFIX: /api/v1

# -------------------- 多服务模式 --------------------
# 与 service 互斥，多容器编排场景使用
